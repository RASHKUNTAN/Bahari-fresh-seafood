<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bahari Fresh | Seller Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Seller Dashboard</h1>

  <!-- Logout Button -->
  <button id="logoutBtn" style="background:red; color:white; padding:8px 12px; margin-bottom:20px;">
    Logout
  </button>

  <!-- Add Product Form -->
  <form id="addProductForm">
    <input type="text" id="productName" placeholder="Product Name" required>
    <input type="number" id="productPrice" placeholder="Price (KSh)" required>
    <input type="text" id="productImage" placeholder="Image URL" required>
    <select id="productCategory" required>
      <option value="">Select Category</option>
      <option value="whole">Whole Fish</option>
      <option value="fillet">Fillet</option>
      <option value="crustacean">Crustacean</option>
    </select>
    <textarea id="productDescription" placeholder="Description"></textarea>
    <input type="number" id="productStock" placeholder="Stock Quantity" required>
    <button type="submit">Add Product</button>
  </form>

  <h2>Existing Products</h2>
  <div id="productList"></div>

  <!-- Orders Section -->
  <h2>Customer Orders</h2>
  <div id="orderList"></div>

  <!-- Edit Product Modal -->
  <div id="editModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close" onclick="closeEditModal()">&times;</span>
      <h2>Edit Product</h2>
      <form id="editProductForm">
        <input type="hidden" id="editProductId">
        <input type="text" id="editProductName" placeholder="Product Name" required>
        <input type="number" id="editProductPrice" placeholder="Price (KSh)" required>
        <input type="text" id="editProductImage" placeholder="Image URL" required>
        <select id="editProductCategory" required>
          <option value="whole">Whole Fish</option>
          <option value="fillet">Fillet</option>
          <option value="crustacean">Crustacean</option>
        </select>
        <textarea id="editProductDescription" placeholder="Description"></textarea>
        <input type="number" id="editProductStock" placeholder="Stock Quantity" required>
        <button type="submit">Update Product</button>
      </form>
    </div>
  </div>

  <script>
    // Restrict access to admins
    const role = localStorage.getItem('userRole');
    if (role !== 'admin') {
      alert('Access denied: Admins only');
      window.location.href = 'index.html';
    }

    const token = localStorage.getItem('authToken');

    // Logout functionality
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      localStorage.removeItem('authToken');
      localStorage.removeItem('userRole');
      await fetch('/api/auth/logout', { method: 'POST' });
      alert('Logged out successfully!');
      window.location.href = 'index.html';
    });

    // Add product
    document.getElementById('addProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const product = {
        name: document.getElementById('productName').value,
        price: document.getElementById('productPrice').value,
        image: document.getElementById('productImage').value,
        category: document.getElementById('productCategory').value,
        description: document.getElementById('productDescription').value,
        stock: document.getElementById('productStock').value
      };

      const res = await fetch('/api/products', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(product)
      });

      const data = await res.json();
      alert('Product added successfully!');
      loadProducts();
    });

    // Load products
    async function loadProducts() {
      const res = await fetch('/api/products');
      const products = await res.json();
      const list = document.getElementById('productList');
      list.innerHTML = products.map(p => `
        <div>
          <h3>${p.name}</h3>
          <p>KSh ${p.price}</p>
          <img src="${p.image}" width="100">
          <button onclick="openEditModal('${p._id}', '${p.name}', ${p.price}, '${p.image}', '${p.category}', '${p.description}', ${p.stock})">Edit</button>
          <button onclick="deleteProduct('${p._id}')">Delete</button>
        </div>
      `).join('');
    }

    // Delete product
    async function deleteProduct(id) {
      const res = await fetch('/api/products/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      alert(data.message);
      loadProducts();
    }

    // Open edit modal
    function openEditModal(id, name, price, image, category, description, stock) {
      document.getElementById('editProductId').value = id;
      document.getElementById('editProductName').value = name;
      document.getElementById('editProductPrice').value = price;
      document.getElementById('editProductImage').value = image;
      document.getElementById('editProductCategory').value = category;
      document.getElementById('editProductDescription').value = description;
      document.getElementById('editProductStock').value = stock;
      document.getElementById('editModal').style.display = 'block';
    }

    // Close edit modal
    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    // Update product
    document.getElementById('editProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editProductId').value;
      const product = {
        name: document.getElementById('editProductName').value,
        price: document.getElementById('editProductPrice').value,
        image: document.getElementById('editProductImage').value,
        category: document.getElementById('editProductCategory').value,
        description: document.getElementById('editProductDescription').value,
        stock: document.getElementById('editProductStock').value
      };

      const res = await fetch('/api/products/' + id, {
        method: 'PUT',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(product)
      });

      const data = await res.json();
      alert('Product updated successfully!');
      closeEditModal();
      loadProducts();
    });

    // Load orders
    async function loadOrders() {
      const res = await fetch('/api/orders', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const orders = await res.json();
      const list = document.getElementById('orderList');
      list.innerHTML = orders.map(o => `
        <div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">
          <h3>Order #${o._id}</h3>
          <p><strong>User:</strong> ${o.userId?.name || 'N/A'} (${o.userId?.email || ''})</p>
          <p><strong>Total:</strong> KSh ${o.total}</p>
          <p><strong>Status:</strong> ${o.status}</p>
          <p><strong>Products:</strong></p>
          <ul>
            ${o.products.map(p => `<li>${p.productId?.name} x ${p.quantity}</li>`).join('')}
          </ul>
          <select onchange="updateOrderStatus('${o._id}', this.value)">
            <option value="">Update Status</option>
            <option value="Pending">Pending</option>
            <option value="Shipped">Shipped</option>
            <option value="Delivered">Delivered</option>
          </select>
        </div>
      `).join('');
    }

    // Update order status
    async function updateOrderStatus(id, status) {
      const res = await fetch('/api/orders/' + id + '/status', {
        method: 'PUT',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ status })
      });
      const data = await res.json();
      alert('Order status updated!');
      loadOrders();
    }

    // Initial load
    loadProducts();
    loadOrders();
  </script>
</body>
</html>
